name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable

      - name: Install wasm-tools
        run: cargo install --locked wasm-tools

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build component
        run: |
          make setup
          make componentify-dev
          make componentify-prod

  notify-downstream:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_PAT }}
          repository: Kotlin/hyperlight-wasm-http-example
          event-type: upstream-changed
          client-payload: '{"repo": "${{ github.repository }}", "sha": "${{ github.sha }}"}'
